version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Fetch secrets from AWS Secrets Manager
        - export SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id fl-admin-portal/${AWS_BRANCH} --query SecretString --output text)
        # Export all secrets as environment variables
        - export $(echo $SECRET_JSON | jq -r 'to_entries | map("\(.key)=\(.value)") | .[]')
        # Configure GitHub Packages authentication for @jaedag scope
        - echo "@jaedag:registry=https://npm.pkg.github.com" > .npmrc
        - echo "//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}" >> .npmrc
        # Install root dependencies
        - npm install
        # Install frontend dependencies with GitHub token
        - cd web-react-ts && cp ../.npmrc . && npm install && cd ..
    build:
      commands:
        # Generate build version metadata
        - cd web-react-ts
        - npm run generate-build-version
        # Build the React app with TypeScript
        - npm run build
        - cd ..
  artifacts:
    # Output directory for Vite build
    baseDirectory: web-react-ts/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - web-react-ts/node_modules/**/*
