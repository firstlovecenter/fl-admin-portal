# Dependabot version updates for the FL Admin Portal monorepo.
# Not an npm workspace — each package manifest needs its own entry.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # ── Root (monorepo orchestration + lint-staged) ──────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      root-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # ── Frontend (web-react-ts) ──────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/web-react-ts"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      frontend-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # ── Backend (api) ────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      backend-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # ── GitHub Actions used in .github/workflows ─────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"

  # ── Docker base image for the api container ──────────────────────────────
  # web-react-ts/Dockerfile (node:12) is intentionally NOT watched: it is only
  # the local docker-compose `ui` dev service; the frontend ships via Amplify,
  # not this image, so bumping it adds PR noise for no deployed surface.
  - package-ecosystem: "docker"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
