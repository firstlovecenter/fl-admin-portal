name: test-backend

on:
  pull_request:
    branches: [deploy, dev, staging]
  push:
    branches: [dev, staging]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: test-backend-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: jest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect relevant changes
        if: github.event_name == 'pull_request'
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - 'api/**'
              - 'lib/**'
              - 'kb/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/test-backend.yml'

      - name: Skip — no backend-relevant changes
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant != 'true'
        run: echo "No api/, lib/, kb/, or root manifest changes — backend tests skipped."

      - name: Setup Node.js
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: npm ci

      - name: Jest with coverage (unit only)
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always() && (github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: api/coverage
          if-no-files-found: ignore

      - name: Coverage PR comment
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant == 'true'
        uses: MishaKav/jest-coverage-comment@v1.0.27
        with:
          title: Backend coverage
          coverage-summary-path: api/coverage/coverage-summary.json
          summary-title: Backend coverage summary
          badge-title: backend
          hide-summary: false
