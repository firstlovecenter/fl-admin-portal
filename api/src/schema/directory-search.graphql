    )
    @cypher(
      statement: """
      MATCH (council:Council {id: $councilId})-[:HAS*2]->(bacenta:Bacenta)

      WHERE toLower(bacenta name) STARTS WITH toLower($searchKey)
      OR toLower(bacenta name) CONTAINS toLower($searchKey)
      RETURN bacenta LIMIT 5
      """
      columnName: "bacenta"
    )
  governorshipBacentaSearch(
    searchKey: String!
    governorshipId: ID!
  ): [Bacenta!]!
    @authentication(
      jwt: {
        OR: [
          { roles: { includes: "adminGovernorship" } }
          { roles: { includes: "leaderGovernorship" } }
          { roles: { includes: "arrivalsAdminGovernorship" } }
        ]
      }
    )
    @cypher(
      statement: """
      MATCH (governorship:Governorship {id:$governorshipId})
      MATCH (governorship)-[:HAS]->(bacenta:Bacenta)

      WHERE toLower(bacenta name) STARTS WITH toLower($searchKey)
      OR toLower(bacenta name) CONTAINS toLower($searchKey)
      RETURN bacenta LIMIT 5
      """
      columnName: "bacenta"
    )

  ### Governorship Search ###
  oversightGovernorshipSearch(
    searchKey: String!
    oversightId: ID!
  ): [Governorship!]!
    @authentication(
      jwt: {
        OR: [
          { roles: { includes: "adminOversight" } }
