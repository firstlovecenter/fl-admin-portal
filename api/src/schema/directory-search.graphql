extend type Query {
  ###Member Searches%####
  oversightMemberSearch(searchKey: String!, oversightId: ID!): [Member!]!
    @cypher(
      statement: """
      MATCH (oversight:Oversight {id: $oversightId})-[:HAS]->(gathering:Campus)-[:HAS]->(stream:Stream)-[:HAS]->(:Council)-[:HAS]->(:Governorship)-[:HAS]->(:Bacenta)<-[:BELONGS_TO]-(member:Active:Member)
      WHERE toLower(member.firstName) STARTS WITH toLower($searchKey)
      OR toLower(member.middleName) STARTS WITH toLower($searchKey)
      OR toLower(member.lastName) STARTS WITH toLower($searchKey)
      OR toLower(member.firstName + ' ' + member.lastName) CONTAINS toLower($searchKey)
      OR toLower(member.firstName + ' ' + member.middleName+ ' '+ member.lastName) CONTAINS toLower($searchKey)
      RETURN member LIMIT 5
      """
      columnName: "member"
    )

  campusMemberSearch(searchKey: String!, campusId: ID!): [Member!]!
    @authentication(
      jwt: {
        OR: [
          { roles_INCLUDES: "adminCampus" }
          { roles_INCLUDES: "leaderCampus" }
          { roles_INCLUDES: "arrivalsAdminCampus" }
        ]
      }
    )
    @cypher(
      statement: """
      MATCH (gathering:Campus {id: $campusId})-[:HAS]->(stream:Stream)-[:HAS]->(:Council)-[:HAS]->(:Governorship)-[:HAS]->(:Bacenta)<-[:BELONGS_TO]-(member:Active:Member)
      WHERE toLower(member.firstName) STARTS WITH toLower($searchKey)
      OR toLower(member.middleName) STARTS WITH toLower($searchKey)
      OR toLower(member.lastName) STARTS WITH toLower($searchKey)
      OR toLower(member.firstName + ' ' + member.lastName) CONTAINS toLower($searchKey)
      OR toLower(member.firstName + ' ' + member middleName+ ' '+ member.lastName) CONTAINS toLower($searchKey)
      RETURN member LIMIT 5
      """
      columnName: "member"
    )
  streamMemberSearch(searchKey: String!, streamId: ID!): [Member!]!
    @authentication(
      jwt: {
        OR: [
          { roles_INCLUDES: "adminStream" }
          { roles_INCLUDES: "leaderStream" }
          { roles_INCLUDES: "arrivalsAdminStream" }
        ]
      }
    )
    @cypher(
      statement: """
      MATCH (stream:Stream {id: $streamId})-[:HAS]->(:Council)-[:HAS]->(:Governorship)-[:HAS]->(:Bacenta)<-[:BELONGS_TO]-(member:Active:Member)
      WHERE toLower(member.firstName) STARTS WITH toLower($searchKey)
      OR toLower(member middleName) STARTS WITH toLower($searchKey)
      OR toLower(member lastName) STARTS WITH toLower($searchKey)
      OR toLower(member firstName + ' ' + member lastName) CONTAINS toLower($searchKey)
      OR toLower(member firstName + ' ' + member middleName+ ' '+ member lastName) CONTAINS toLower($searchKey)
      WITH member WHERE member IS NOT NULL
      RETURN DISTINCT(member) AS member LIMIT 5
      """
      columnName: "member"
    )
  councilMemberSearch(searchKey: String!, councilId: ID!): [Member!]!
    @authentication(
      jwt: {
        OR: [
          { roles_INCLUDES: "adminCouncil" }
          { roles_INCLUDES: "leaderCouncil" }
          { roles_INCLUDES: "arrivalsAdminCouncil" }
        ]
      }
    )
    @cypher(
      statement: """
      MATCH (council:Council {id: $councilId})-[:HAS]->(:Governorship)-[:HAS]->(:Bacenta)<-[:BELONGS_TO]-(member:Active:Member)
      WHERE toLower(member firstName) STARTS WITH toLower($searchKey)
      OR toLower(member middleName) STARTS WITH toLower($searchKey)
      OR toLower(member lastName) STARTS WITH toLower($searchKey)
      OR toLower(member firstName + ' ' + member lastName) CONTAINS toLower($searchKey)
      OR toLower(member firstName + ' ' + member middleName+ ' '+ member lastName) CONTAINS toLower($searchKey)
      WITH member WHERE member IS NOT NULL
      RETURN DISTINCT(member) AS member LIMIT 5
      """
      columnName: "member"
    )
  governorshipMemberSearch(searchKey: String!, governorshipId: ID!): [Member!]!
    @authentication(
      jwt: {
        OR: [
          { roles_INCLUDES: "adminGovernorship" }
          { roles_INCLUDES: "leaderGovernorship" }
          { roles_INCLUDES: "arrivalsAdminGovernorship" }
        ]
      }
    )
    @cypher(
      statement: """
      MATCH (governorship:Governorship {id:$governorshipId})
      MATCH (governorship)-[:HAS]->(:Bacenta)<-[:BELONGS_TO]-(member:Active:Member)
      WHERE toLower(member firstName) STARTS WITH toLower($searchKey)
      OR toLower(member middleName) STARTS WITH toLower($searchKey)
      OR toLower(member lastName) STARTS WITH toLower($searchKey)
      OR toLower(member firstName + ' ' + member lastName) CONTAINS toLower($searchKey)
      OR toLower(member firstName + ' ' + member middleName+ ' '+ member lastName) CONTAINS toLower($searchKey)
      RETURN member LIMIT 5
      """
      columnName: "member"
    )
  bacentaMemberSearch(searchKey: String!, bacentaId: ID!): [Member!]!
    @authentication(jwt: { OR: [{ roles_INCLUDES: "leaderBacenta" }] })
    @cypher(
      statement: """
      MATCH (bacenta:Bacenta {id: $bacentaId})<-[:BELONGS_TO]-(member:Active:Member)
      WHERE toLower(member firstName) STARTS WITH toLower($searchKey)
      OR toLower(member middleName) STARTS WITH toLower($searchKey)
      OR toLower(member lastName) STARTS WITH toLower($searchKey)
