extend type Member {
  memberSearch(key: String!, limit: Int! = 5, offset: Int! = 0): [Member!]!
    @cypher(
      statement: """
      MATCH (this)-[:LEADS|HAS|DOES_ARRIVALS_FOR|IS_ADMIN_FOR|IS_SHEEP_SEEKER_FOR*1..7]->(:Bacenta)<-[:BELONGS_TO]-(members:Active:Member)
      WHERE toLower(members.firstName+ ' ' + members.middleName + ' ' + members.lastName) CONTAINS toLower($key)
      OR toLower(members.firstName + ' ' + members.lastName) CONTAINS toLower($key)
      OR toLower(members.email) CONTAINS toLower($key)
      RETURN DISTINCT members AS memberSearch ORDER BY toLower(members.lastName), toLower(members.firstName) SKIP $offset LIMIT $limit
      """
      columnName: "memberSearch"
    )
  bacentaSearch(key: String!, limit: Int! = 5, offset: Int! = 0): [Bacenta!]!
    @cypher(
      statement: """
      MATCH (this)-[:LEADS|HAS|DOES_ARRIVALS_FOR|IS_ADMIN_FOR*1..7]->(bacenta:Bacenta)
      WHERE toLower(bacenta.name) CONTAINS toLower($key)
      RETURN DISTINCT bacenta AS bacentaSearch SKIP $offset LIMIT $limit
      """
      columnName: "bacentaSearch"
    )
  governorshipSearch(key: String!, limit: Int! = 5, offset: Int! = 0): [Governorship!]!
    @cypher(
      statement: """
      MATCH (this)-[:LEADS|HAS|DOES_ARRIVALS_FOR|IS_ADMIN_FOR*1..6]->(governorship:Governorship)
      WHERE toLower(governorship.name) CONTAINS toLower($key)
      RETURN DISTINCT governorship AS governorshipSearch SKIP $offset LIMIT $limit
      """
      columnName: "governorshipSearch"
    )
  councilSearch(key: String!, limit: Int! = 5, offset: Int! = 0): [Council!]!
    @cypher(
      statement: """
      MATCH (this)-[:LEADS|HAS|DOES_ARRIVALS_FOR|IS_ADMIN_FOR*1..5]->(council:Council)
      WHERE toLower(council.name) CONTAINS toLower($key)
      RETURN DISTINCT council AS councilSearch SKIP $offset LIMIT $limit
      """
      columnName: "councilSearch"
    )
  streamSearch(key: String!, limit: Int! = 5, offset: Int! = 0): [Stream!]!
    @cypher(
      statement: """
      MATCH (this)-[:LEADS|HAS|DOES_ARRIVALS_FOR|IS_ADMIN_FOR*1..4]->(stream:Stream)
      WHERE toLower(stream.name) CONTAINS toLower($key)
      RETURN DISTINCT stream AS streamSearch SKIP $offset LIMIT $limit
      """
      columnName: "streamSearch"
    )
  campusSearch(key: String!, limit: Int! = 5, offset: Int! = 0): [Campus!]!
    @cypher(
      statement: """
      MATCH (this)-[:LEADS|HAS|DOES_ARRIVALS_FOR|IS_ADMIN_FOR*1..3]->(campus:Campus)
      WHERE toLower(campus.name) CONTAINS toLower($key)
      RETURN DISTINCT campus AS campusSearch SKIP $offset LIMIT $limit
      """
      columnName: "campusSearch"
    )
  oversightSearch(key: String!, limit: Int! = 5, offset: Int! = 0): [Oversight!]!
    @cypher(
      statement: """
      MATCH (this)-[:LEADS|HAS|IS_ADMIN_FOR*1..2]->(oversight:Oversight)
      WHERE toLower(oversight.name) CONTAINS toLower($key)
      RETURN DISTINCT oversight AS oversightSearch SKIP $offset LIMIT $limit
      """
      columnName: "oversightSearch"
    )

}

