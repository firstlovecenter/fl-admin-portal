      MATCH (oversight:Oversight {id: $oversightId})-[:HAS]->(gathering:Campus)-[:HAS]->(stream:Stream)-[:HAS]->(:Council)-[:HAS]->(governorship:Governorship)
      WHERE toLower(governorship name) STARTS WITH toLower($searchKey)
