enum CheckInScopeLevel {
  OVERSIGHT
  CAMPUS
  STREAM
  COUNCIL
  GOVERNORSHIP
  BACENTA
}

enum CheckInAttendanceType {
  LEADERS_ONLY
  ALL_MEMBERS
}

enum CheckInStatus {
  ACTIVE
  PAUSED
  ENDED
}

enum CheckInMethod {
  QR
  PIN
  FACE_ID
  MANUAL
}

enum CheckInRoleType {
  leaderBacenta
  leaderCouncil
  leaderStream
  leaderGovernorship
  leaderCampus
}

enum GeoFenceType {
  CIRCLE
  POLYGON
}

enum FaceMatchStatus {
  PENDING
  VERIFIED
  FLAGGED
  SKIPPED
}

input GeoPointInput {
  latitude: Float!
  longitude: Float!
}

input UpdateCheckInEventInput {
  name: String
  location: String
  startsAt: DateTime
  endsAt: DateTime
  gracePeriod: Int
  attendanceType: CheckInAttendanceType
  allowedCheckInRoles: [CheckInRoleType!]
  allowedCheckInMethods: [CheckInMethod!]
  geoFenceType: GeoFenceType
  geoCenter: GeoPointInput
  geoRadius: Int
  geoPolygon: [GeoPointInput!]
  autoCheckoutMinutes: Int
}

input CreateCheckInEventInput {
  name: String!
  location: String
  scopeLevel: CheckInScopeLevel!
  scopeId: ID!
  startsAt: DateTime!
  endsAt: DateTime!
  gracePeriod: Int
  attendanceType: CheckInAttendanceType!
  allowedCheckInRoles: [CheckInRoleType!]!
  """Methods available for check-in: QR, PIN, FACE_ID (at least one required)"""
  allowedCheckInMethods: [CheckInMethod!]!
  geoFenceType: GeoFenceType!
  geoCenter: GeoPointInput
  geoRadius: Int
  geoPolygon: [GeoPointInput!]
  """Minutes outside geofence before auto-checkout (default 30)"""
  autoCheckoutMinutes: Int
}

type GeoPoint {
  latitude: Float!
  longitude: Float!
}

type CheckInEvent {
  id: ID!
  name: String!
  location: String
  scopeLevel: CheckInScopeLevel!
  scopeId: ID!
  startsAt: DateTime!
  endsAt: DateTime!
  gracePeriod: Int!
  attendanceType: CheckInAttendanceType!
  status: CheckInStatus!
  pinCode: String
  qrToken: String
  createdAt: DateTime!
  createdById: ID!
  createdByName: String!
  createdByRole: String!
  totalExpected: Int!
  allowedCheckInRoles: [CheckInRoleType!]!
  """Methods available for check-in (QR, PIN, FACE_ID)"""
  allowedCheckInMethods: [CheckInMethod!]!
  geoFenceType: GeoFenceType!
  geoCenter: GeoPoint
  geoRadius: Int
  geoPolygon: [GeoPoint!]
  """Minutes outside geofence before auto-checkout"""
  autoCheckoutMinutes: Int!
}

type CheckInRecord {
  id: ID!
  eventId: ID!
  memberId: ID!
  memberName: String!
  memberRole: String!
  memberUnit: String!
  checkedInAt: DateTime!
  checkInMethod: CheckInMethod!
  verifiedBy: String!
  geoVerified: Boolean
  distanceFromVenue: Float
  selfieUrl: String
  faceMatchScore: Float
  faceMatchStatus: FaceMatchStatus
  deviceFingerprint: String
  """Timestamp when the member was checked out (null if still checked in)"""
  checkedOutAt: DateTime
  """Whether the checkout was triggered automatically by geofence monitoring"""
  autoCheckedOut: Boolean
}

type CheckInAttendee {
  memberId: ID!
  firstName: String!
  lastName: String!
  fullName: String!
  roleLabel: String!
  unitName: String!
  unitType: String!
  checkedInAt: DateTime
  checkInMethod: CheckInMethod
  isLate: Boolean!
  geoVerified: Boolean
  faceMatchStatus: FaceMatchStatus
  selfieUrl: String
  checkedOutAt: DateTime
  autoCheckedOut: Boolean
}

type CheckInStats {
  totalExpected: Int!
  checkedInCount: Int!
  defaultedCount: Int!
  checkedOutCount: Int!
  percentage: Float!
  flaggedCount: Int!
}

type CheckInScopeFilter {
  id: ID!
  name: String!
  level: CheckInScopeLevel!
}

type FlaggedCheckIn {
  record: CheckInRecord!
  attendee: CheckInAttendee!
  reason: String!
}

type CheckInDashboard {
  event: CheckInEvent!
  checkedIn: [CheckInAttendee!]!
  defaulted: [CheckInAttendee!]!
  checkedOut: [CheckInAttendee!]!
  stats: CheckInStats!
  scopeFilters: [CheckInScopeFilter!]!
  appliedFilterId: ID
  appliedFilterName: String
  childScopeFilters: [CheckInScopeFilter!]!
  flaggedRecords: [FlaggedCheckIn!]!
}

"""Aggregate check-in stats per sub-church for breakdown pages"""
type CheckInScopeAggregate {
  scopeId: ID!
  scopeName: String!
  scopeLevel: CheckInScopeLevel!
  totalEvents: Int!
  totalExpected: Int!
  checkedInCount: Int!
  defaultedCount: Int!
  attendancePercentage: Float!
}

"""Lightweight attendance summary for a single check-in event"""
type CheckInEventSummary {
  eventId: ID!
  totalExpected: Int!
  checkedInCount: Int!
  checkedOutCount: Int!
  defaultedCount: Int!
  percentage: Float!
}

"""Audit trail entry for a check-in event"""
type CheckInHistoryEntry {
  id: ID!
  timestamp: DateTime!
  action: String!
  description: String!
  performedById: ID!
  performedByName: String!
}

extend type Query {
  GetCheckInEvent(eventId: ID!): CheckInEvent!
  """
  Returns all ACTIVE events whose geofence contains the given coordinates.
  Used by the public /qr page so leaders can find and scan a QR without
  needing access to the admin dashboard.
  """
  GetEventsInRange(latitude: Float!, longitude: Float!): [CheckInEvent!]!
  ListCheckInEvents(
    scopeLevel: CheckInScopeLevel
    scopeId: ID
    status: CheckInStatus
  ): [CheckInEvent!]!
  GetCheckInDashboard(eventId: ID!, filterScopeId: ID): CheckInDashboard!
  GetAdminScopes: [CheckInScopeFilter!]!
  GetFlaggedCheckIns(eventId: ID!): [FlaggedCheckIn!]!
  """Get the current user's check-in record for a specific event (null if not checked in)"""
  GetMyCheckInStatus(eventId: ID!): CheckInRecord
  """Get check-in aggregate stats per sub-church for breakdown pages"""
  GetCheckInAggregateByScope(
    scopeLevel: CheckInScopeLevel!
    scopeId: ID!
  ): [CheckInScopeAggregate!]!
  """Get audit history for a check-in event"""
  GetCheckInEventHistory(eventId: ID!, limit: Int): [CheckInHistoryEntry!]!
  """Batch-fetch lightweight attendance stats for multiple events (no eligible-member recalculation)"""
  GetCheckInEventStatsBatch(eventIds: [ID!]!): [CheckInEventSummary!]!
}

extend type Mutation {
  CreateCheckInEvent(input: CreateCheckInEventInput!): CheckInEvent!
  CheckInMember(
    eventId: ID!
    method: CheckInMethod!
    code: String
    deviceFingerprint: String!
    latitude: Float!
    longitude: Float!
    selfieBase64: String
    faceMatchScore: Float
    faceMatchStatus: FaceMatchStatus
  ): CheckInRecord!
  ManualCheckIn(
    eventId: ID!
    memberId: ID!
    latitude: Float!
    longitude: Float!
    reason: String
  ): CheckInRecord!
  """Auto-checkout a member who has left the geofence for too long"""
  CheckOutMember(
    eventId: ID!
    latitude: Float!
    longitude: Float!
    deviceFingerprint: String!
  ): CheckInRecord!
  UpdateCheckInEventDuration(eventId: ID!, endsAt: DateTime!): CheckInEvent!
  UpdateCheckInEvent(eventId: ID!, input: UpdateCheckInEventInput!): CheckInEvent!
  PauseCheckInEvent(eventId: ID!): CheckInEvent!
  ResumeCheckInEvent(eventId: ID!): CheckInEvent!
  ResetCheckInEventPin(eventId: ID!): CheckInEvent!
  EndCheckInEvent(eventId: ID!): CheckInEvent!
  ResolveFlaggedCheckIn(recordId: ID!, resolution: String!): CheckInRecord!
  """
  Report a member's current location during an event.
  If they are outside the geofence, they are immediately auto-checked out.
  Returns the updated CheckInRecord, or null if the member has not checked in.
  """
  ReportMemberLocation(
    eventId: ID!
    latitude: Float!
    longitude: Float!
  ): CheckInRecord
  """Log an audit history entry for a check-in event"""
  LogCheckInHistory(
    eventId: ID!
    action: String!
    description: String!
  ): CheckInHistoryEntry!
}
