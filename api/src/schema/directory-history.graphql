  LogMemberHistory(ids: [ID], historyRecord: String!): Member
    @authentication(
      jwt: {
        OR: [
          { roles: { includes: "leaderBacenta" } }
          { roles: { includes: "leaderGovernorship" } }
          { roles: { includes: "leaderCouncil" } }
          { roles: { includes: "leaderStream" } }
          { roles: { includes: "leaderCampus" } }
          { roles: { includes: "leaderOversight" } }
          { roles: { includes: "leaderDenomination" } }
          { roles: { includes: "adminGovernorship" } }
          { roles: { includes: "adminCouncil" } }
          { roles: { includes: "adminStream" } }
          { roles: { includes: "adminCampus" } }
          { roles: { includes: "adminOversight" } }
          { roles: { includes: "adminDenomination" } }
        ]
      }
    )
    @cypher(
      statement: """
       CREATE (log:HistoryLog)
         SET log.id = apoc.create.uuid(),
          log.timeStamp = datetime(),
          log.historyRecord = $historyRecord

       WITH  log
      MERGE (date:TimeGraph {date: date()})

      WITH log, date
      MATCH (author:Active:Member {id: $jwt.userId})
       MERGE (log)-[:LOGGED_BY]->(author)
       MERGE (log)-[:RECORDED_ON]->(date)


      WITH log
       UNWIND $ids AS nodeId
       MATCH (node:Active:Member {id: nodeId})
       MERGE (node)-[:HAS_HISTORY]->(log)

      RETURN node AS member
      """
      columnName: "member"
    )

