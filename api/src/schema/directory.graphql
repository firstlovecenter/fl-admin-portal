          ('Bacenta Leader' IN $leaderRanks AND EXISTS { MATCH (members)-[:LEADS]->(:Bacenta) }) OR
          ('CO' IN $leaderRanks AND EXISTS { MATCH (members)-[:LEADS]->(:Governorship) }) OR
          ('Admin' IN $leaderRanks AND (EXISTS { MATCH (members)-[:IS_ADMIN_FOR]->(:Council) } OR EXISTS { MATCH (members)-[:IS_ADMIN_FOR]->(:Governorship) }))
        ))
      RETURN DISTINCT members AS members
      ORDER BY toLower(members.firstName), toLower(members.lastName)
      SKIP $offset LIMIT $limit
      """
      columnName: "members"
    )
  memberCount: Int!
    @cypher(
      statement: """
      MATCH (this)-[:HAS*]->(:Bacenta)<-[:BELONGS_TO]-(members:Active:Member)
      RETURN COUNT(DISTINCT members) AS memberCount
      """
      columnName: "memberCount"
    )
  pastorCount: Int
    @cypher(
      statement: """
      MATCH (this)-[:HAS*]->(:Bacenta)<-[:BELONGS_TO]-(pastors:Active:Member)-[:HAS_TITLE]->(:Title)
      RETURN COUNT(DISTINCT pastors) AS pastorCount
      """
      columnName: "pastorCount"
    )
  bacentas: [Bacenta!]! @relationship(type: "HAS", direction: OUT)

  bacentaCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS]->(bacentas:Bacenta)  RETURN COUNT(DISTINCT bacentas) AS bacentaCount"
      columnName: "bacentaCount"
    )
  activeBacentaCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS]->(bacentas:Active:Bacenta)  RETURN COUNT(DISTINCT bacentas) AS activeBacentaCount"
      columnName: "activeBacentaCount"
    )
  vacationBacentaCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS]-(bacentas:Vacation:Bacenta)  RETURN COUNT(DISTINCT bacentas) AS vacationBacentaCount"
      columnName: "vacationBacentaCount"
    )
  activeBacentaICCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS]->(bacentas:Active:Bacenta:Red)  RETURN COUNT(DISTINCT bacentas) AS activeBacentaICCount"
      columnName: "activeBacentaICCount"
    )
  vacationBacentaICCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS]-(bacentas:Vacation:Bacenta:Red)  RETURN COUNT(DISTINCT bacentas) AS vacationBacentaICCount"
      columnName: "vacationBacentaICCount"
    )
  activeGraduatedBacentaCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS]->(bacentas:Active:Bacenta:Green) RETURN COUNT(DISTINCT bacentas) AS activeGraduatedBacentaCount"
      columnName: "activeGraduatedBacentaCount"
    )
  vacationGraduatedBacentaCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS]-(bacentas:Vacation:Bacenta:Green) RETURN COUNT(DISTINCT bacentas) AS vacationGraduatedBacentaCount"
      columnName: "vacationGraduatedBacentaCount"
    )

  leader: Member @relationship(type: "LEADS", direction: IN)
  council: Council @relationship(type: "HAS", direction: IN)

  admin: Member @relationship(type: "IS_ADMIN_FOR", direction: IN)
  history(limit: Int! = 3, offset: Int! = 0): [HistoryLog!]!
    @cypher(
      statement: "MATCH (this)-[:HAS_HISTORY|OLD_HISTORY]->(log:HistoryLog) RETURN DISTINCT log AS history ORDER BY log.timeStamp DESC, log.id SKIP $offset LIMIT $limit"
      columnName: "history"
    )
  historyCount: Int!
    @cypher(
      statement: "MATCH (this)-[:HAS_HISTORY|OLD_HISTORY]->(log:HistoryLog) RETURN count(DISTINCT log) AS total"
      columnName: "total"
    )
  serviceRecord: [ServiceRecord!]!
    @relationship(type: "HAS_SERVICE", direction: OUT)
  serviceLogs: [ServiceLog!]! @relationship(type: "HAS_HISTORY", direction: OUT)
  services(limit: Int! = 12, skip: Int = 0): [ServiceRecord!]!
    @cypher(
      statement: """
      MATCH (this)-[:HAS_HISTORY]->(:ServiceLog)-[:HAS_SERVICE]->(records:ServiceRecord)-[:SERVICE_HELD_ON]->(date:TimeGraph)
      WITH DISTINCT records, date
      RETURN records AS services ORDER BY date.date DESC SKIP $skip LIMIT $limit
      """
      columnName: "services"
    )
}

type Bacenta implements Church {
  id: ID @id
  name: String!
  bankingCode: Int
  location: Point
  isManualBanking: Boolean!
    @cypher(
      statement: """
      MATCH (this)<-[:HAS*3]-(stream:Stream)
      RETURN stream.bankAccount = 'manual' AS isManualBanking
      """
      columnName: "isManualBanking"
    )
  meetingDay: ServiceDay! @relationship(type: "MEETS_ON", direction: OUT)
  stream_name: String
    @cypher(
      statement: """
      MATCH (this)<-[:HAS*3]-(stream:Stream)
      RETURN DISTINCT toLower(stream.name) AS stream_name
      """
      columnName: "stream_name"
    )
  vacationStatus: String!
    @cypher(
      statement: """
      MATCH (this)
      UNWIND labels(this) AS status
      WITH status WHERE status = 'Active' OR status = 'Vacation'
      RETURN status AS status
      """
      columnName: "status"
    )
  labels: [String]
    @cypher(
      statement: """
      MATCH (this)
      RETURN labels(this) AS labels
      """
      columnName: "labels"
    )
  members(
    limit: Int! = 1000
    offset: Int! = 0
    search: String
    genders: [String!]
    maritalStatuses: [String!]
    leaderTitles: [String!]
    basontas: [String!]
    leaderRanks: [String!]
  ): [Member!]!
    @cypher(
      statement: """
      MATCH (this)<-[:BELONGS_TO]-(members:Active:Member)
      WHERE
        ($search IS NULL OR
         toLower(coalesce(members.firstName, '') + ' ' + coalesce(members.lastName, '')) CONTAINS toLower($search) OR
         (size($search) >= 4 AND coalesce(members.phoneNumber, '') CONTAINS $search))
        AND ($genders IS NULL OR EXISTS { MATCH (members)-[:HAS_GENDER]->(g:Gender) WHERE g.gender IN $genders })
        AND ($maritalStatuses IS NULL OR EXISTS { MATCH (members)-[:HAS_MARITAL_STATUS]->(ms:MaritalStatus) WHERE ms.status IN $maritalStatuses })
        AND ($leaderTitles IS NULL OR EXISTS { MATCH (members)-[:HAS_TITLE]->(t:Title) WHERE t.name IN $leaderTitles })
        AND ($basontas IS NULL OR EXISTS { MATCH (members)-[:BELONGS_TO]->(bs:Basonta) WHERE bs.name IN $basontas })
        AND ($leaderRanks IS NULL OR (
          ('Bacenta Leader' IN $leaderRanks AND EXISTS { MATCH (members)-[:LEADS]->(:Bacenta) }) OR
          ('CO' IN $leaderRanks AND EXISTS { MATCH (members)-[:LEADS]->(:Governorship) }) OR
          ('Admin' IN $leaderRanks AND (EXISTS { MATCH (members)-[:IS_ADMIN_FOR]->(:Council) } OR EXISTS { MATCH (members)-[:IS_ADMIN_FOR]->(:Governorship) }))
        ))
      RETURN DISTINCT members AS members
      ORDER BY toLower(members.firstName), toLower(members.lastName)
      SKIP $offset LIMIT $limit
      """
      columnName: "members"
    )
  memberCount: Int!
    @cypher(
      statement: """
      MATCH (this)<-[:BELONGS_TO]-(members:Active:Member)
      RETURN COUNT(DISTINCT members) AS memberCount
      """
      columnName: "memberCount"
    )
  pastorCount: Int!
    @cypher(
      statement: """
      MATCH (this)<-[:BELONGS_TO]-(pastors:Active:Member)-[:HAS_TITLE]->(:Title)
      RETURN COUNT(DISTINCT pastors) AS pastorCount
      """
      columnName: "pastorCount"
    )
  leader: Member @relationship(type: "LEADS", direction: IN)
  admin: Member @relationship(type: "IS_ADMIN_FOR", direction: IN)
  deputyLeader: Member @relationship(type: "DEPUTY_LEADS", direction: IN)

  governorship: Governorship @relationship(type: "HAS", direction: IN)
  history(limit: Int! = 3, offset: Int! = 0): [HistoryLog!]!
    @cypher(
      statement: "MATCH (this)-[:HAS_HISTORY|OLD_HISTORY]->(log:HistoryLog) RETURN DISTINCT log AS history ORDER BY log.timeStamp DESC, log.id SKIP $offset LIMIT $limit"
      columnName: "history"
    )
  historyCount: Int!
    @cypher(
      statement: "MATCH (this)-[:HAS_HISTORY|OLD_HISTORY]->(log:HistoryLog) RETURN count(DISTINCT log) AS total"
      columnName: "total"
    )
  serviceLogs: [ServiceLog!]! @relationship(type: "HAS_HISTORY", direction: OUT)
  services(limit: Int! = 12, skip: Int = 0): [ServiceRecord!]!
    @cypher(
      statement: """
      MATCH (this)-[:HAS_HISTORY]->(:ServiceLog)-[:HAS_SERVICE]->(services:ServiceRecord)-[:SERVICE_HELD_ON]->(date:TimeGraph)
      WITH DISTINCT services, date
      RETURN services AS services ORDER BY date.date DESC SKIP $skip LIMIT $limit
      """
      columnName: "services"
    )

  council: Council
    @cypher(
      statement: """
      MATCH (this)<-[:HAS*2]-(council:Council)
      RETURN council AS council
      """
      columnName: "council"
    )
  stream: Stream
    @cypher(
      statement: "MATCH (this)<-[:HAS*3]-(stream:Stream) RETURN stream AS stream"
      columnName: "stream"
    )

}

type Basonta {
  id: ID @id
  name: String!
  leader: Member @relationship(type: "LEADS", direction: IN)
  history(limit: Int! = 3, offset: Int! = 0): [HistoryLog!]!
    @cypher(
      statement: "MATCH (this)-[:HAS_HISTORY|OLD_HISTORY]->(log:HistoryLog) RETURN DISTINCT log AS history ORDER BY log.timeStamp DESC, log.id SKIP $offset LIMIT $limit"
      columnName: "history"
    )
  historyCount: Int!
    @cypher(
      statement: "MATCH (this)-[:HAS_HISTORY|OLD_HISTORY]->(log:HistoryLog) RETURN count(DISTINCT log) AS total"
      columnName: "total"
    )
}
