type Member @node{
  id: ID! @id
  firstName: String #@search
  middleName: String
  lastName: String
  fullName: String @customResolver(requires: "firstName, lastName")
  currentTitle: String
    @cypher(
      statement: """
      OPTIONAL MATCH (this)-[r:HAS_TITLE]->(title:Title)
      WHERE NOT r.inactive = true
      RETURN title.name AS currentTitle ORDER BY title.priority DESC LIMIT 1
      """
      columnName: "currentTitle"
    )
  nameWithTitle: String @customResolver(requires: "firstName, lastName")
  email: String
  phoneNumber: String
  whatsappNumber: String!
  pictureUrl: String
  visitationArea: String
  location: Point
  gender: Gender @relationship(type: "HAS_GENDER", direction: OUT)
  maritalStatus: MaritalStatus
    @relationship(type: "HAS_MARITAL_STATUS", direction: OUT)
  dob: TimeGraph @relationship(type: "WAS_BORN_ON", direction: OUT)
  title: [Title!]!
    @relationship(type: "HAS_TITLE", properties: "HasTitle", direction: OUT)
  stickyNote: String
  occupation: Occupation @relationship(type: "HAS_OCCUPATION", direction: OUT)
  stream_name: String
    @cypher(
      statement: """
      OPTIONAL MATCH (this)-[:BELONGS_TO]->(:Bacenta)<-[:HAS*3]-(stream:Stream)
      RETURN DISTINCT toLower(stream.name) AS stream_name
      """
      columnName: "stream_name"
    )
  # Church Details
  #
  # SECURITY NOTE — self-only gate
  # ------------------------------
  # `members` and `memberCount` below are gated on `this.id = $jwt.userId`,
  # i.e. only the queried Member may be the caller. This was tightened in
  # the SYN-95 / directory-read hardening pass to close a cross-tier PII
  # bypass: previously, ANY caller could query
  # `Member(id: "<other-member>") { members { … } }` and receive that
  # member's leadership tree.
  #
  # The intended product semantic was "members under the leaders I lead or
  # admin." The current rule is mechanically safe but broader than that —
  # it makes the field unusable for legitimate org-chart traversals where
  # the caller IS a servant of `this` but is not `this` themselves
  # (e.g. an admin viewing a leader's downline).
  #
  # SYN-146 item 5 (TODO) — replace `this.id = $jwt.userId` with a
  # per-target authority predicate: the caller must hold any servant edge
  # (`LEADS`, `DEPUTY_LEADS`, `IS_ADMIN_FOR`) that reaches `this`'s spine
  # root via `[:HAS*0..6]`. No FE caller is broken by the current gate —
  # `MembersGrid` does not consume these fields — so the v2 rollout can
  # happen on its own schedule.
  members(
    limit: Int! = 1000
    offset: Int! = 0
    search: String
    genders: [String!]
    maritalStatuses: [String!]
    leaderTitles: [String!]
    basontas: [String!]
    leaderRanks: [String!]
  ): [Member!]!
    @cypher(
      statement: """
      WITH this, $jwt AS jwt
      WHERE this.id = jwt.userId
      MATCH (this)-[:LEADS|HAS|DOES_ARRIVALS_FOR|IS_ADMIN_FOR*1..7]->(:Bacenta)<-[:BELONGS_TO]-(members:Active:Member)
      WHERE
        ($search IS NULL OR
         toLower(coalesce(members.firstName, '') + ' ' + coalesce(members.lastName, '')) CONTAINS toLower($search) OR
         (size($search) >= 4 AND coalesce(members.phoneNumber, '') CONTAINS $search))
        AND ($genders IS NULL OR EXISTS { MATCH (members)-[:HAS_GENDER]->(g:Gender) WHERE g.gender IN $genders })
        AND ($maritalStatuses IS NULL OR EXISTS { MATCH (members)-[:HAS_MARITAL_STATUS]->(ms:MaritalStatus) WHERE ms.status IN $maritalStatuses })
        AND ($leaderTitles IS NULL OR EXISTS { MATCH (members)-[:HAS_TITLE]->(t:Title) WHERE t.name IN $leaderTitles })
        AND ($basontas IS NULL OR EXISTS { MATCH (members)-[:BELONGS_TO]->(bs:Basonta) WHERE bs.name IN $basontas })
        AND ($leaderRanks IS NULL OR (
          ('Bacenta Leader' IN $leaderRanks AND EXISTS { MATCH (members)-[:LEADS]->(:Bacenta) }) OR
          ('CO' IN $leaderRanks AND EXISTS { MATCH (members)-[:LEADS]->(:Governorship) }) OR
          ('Admin' IN $leaderRanks AND (EXISTS { MATCH (members)-[:IS_ADMIN_FOR]->(:Council) } OR EXISTS { MATCH (members)-[:IS_ADMIN_FOR]->(:Governorship) }))
        ))
      RETURN DISTINCT members AS members
      ORDER BY toLower(members.firstName), toLower(members.lastName)
      SKIP $offset LIMIT $limit
      """
      columnName: "members"
    )

  memberCount: Int
    @cypher(
      statement: """
      RETURN CASE
        WHEN this.id = $jwt.userId
        THEN COUNT { (this)-[:LEADS|HAS|DOES_ARRIVALS_FOR|IS_ADMIN_FOR*1..7]->(:Bacenta)<-[:BELONGS_TO]-(:Active:Member) }
        ELSE 0
      END AS memberCount
      """
      columnName: "memberCount"
    )
  history(limit: Int! = 3, offset: Int! = 0): [HistoryLog!]!
    @cypher(
      statement: "MATCH (this)-[:HAS_HISTORY|OLD_HISTORY]->(log:HistoryLog) RETURN DISTINCT log AS history ORDER BY log.timeStamp DESC, log.id SKIP $offset LIMIT $limit"
      columnName: "history"
    )
  historyCount: Int!
    @cypher(
      statement: "MATCH (this)-[:HAS_HISTORY|OLD_HISTORY]->(log:HistoryLog) RETURN count(DISTINCT log) AS total"
      columnName: "total"
    )
  loggedHistory: [HistoryLog!]! @relationship(type: "LOGGED_BY", direction: IN)
  bacenta: Bacenta @relationship(type: "BELONGS_TO", direction: OUT)
  # Display-only summary of the member's bacenta — id + name only. Unscoped
  # so a cross-scope viewer can still see "[Member] belongs to [Bacenta]"
  # on the member profile for organisational context, even when the full
  # `bacenta` relationship above is filtered to null by the Bacenta spine
  # read-filter. No leader, members, history, services, or financials are
  # exposed — those remain gated behind the scoped relationship and the
  # spine read-filter. The frontend MUST treat this purely as text; the
  # unscoped id is NOT a valid navigation target (`useCanViewChurch` will
  # return false for an out-of-scope bacenta).
  bacentaSummary: BacentaSummary
    @cypher(
      statement: "MATCH (this)-[:BELONGS_TO]->(b:Bacenta) RETURN { id: b.id, name: b.name } AS bacentaSummary LIMIT 1"
      columnName: "bacentaSummary"
    )
  basonta: Basonta @relationship(type: "BELONGS_TO", direction: OUT)
  leadsBacenta: [Bacenta!]! @relationship(type: "LEADS", direction: OUT)
  leadsBacentaCount: Int
    @cypher(
      statement: """
      MATCH (this)-[:LEADS]->(bacentas:Bacenta)
      RETURN COUNT(bacentas) AS leadsBacentaCount
      """
      columnName: "leadsBacentaCount"
    )

  leadsGovernorship: [Governorship!]!
    @relationship(type: "LEADS", direction: OUT)
  leadsGovernorshipCount: Int
    @cypher(
      statement: """
      MATCH (this)-[:LEADS]->(governorship:Governorship)
      RETURN COUNT(DISTINCT governorship) AS leadsGovernorshipCount
      """
      columnName: "leadsGovernorshipCount"
    )
  isAdminForGovernorshipCount: Int
    @cypher(
      statement: """
      MATCH (this)-[:IS_ADMIN_FOR]->(governorship:Governorship)
      RETURN COUNT(DISTINCT governorship) AS isAdminForGovernorshipCount
      """
      columnName: "isAdminForGovernorshipCount"
    )
  leadsAdminsGovernorshipCount: Int
    @cypher(
      statement: """
      MATCH (this)-[:LEADS|IS_ADMIN_FOR]->(governorship:Governorship)
      RETURN COUNT(DISTINCT governorship) AS leadsAdminsGovernorshipCount
      """
      columnName: "leadsAdminsGovernorshipCount"
    )
  leadsCouncil: [Council!]! @relationship(type: "LEADS", direction: OUT)
  leadsCouncilCount: Int
    @cypher(
      statement: """
      MATCH (this)-[:LEADS]->(council:Council)
      RETURN COUNT(DISTINCT council) AS leadsCouncilCount
      """
      columnName: "leadsCouncilCount"
    )
  isAdminForCouncilCount: Int
    @cypher(
      statement: """
      MATCH (this)-[:IS_ADMIN_FOR]->(council:Council)
      RETURN COUNT(DISTINCT council) AS isAdminForCouncilCount
      """
      columnName: "isAdminForCouncilCount"
    )
  leadsAdminsCouncilCount: Int
    @cypher(
      statement: """
      MATCH (this)-[:LEADS|IS_ADMIN_FOR]->(council:Council)
      RETURN COUNT(DISTINCT council) AS leadsAdminsCouncilCount
      """
      columnName: "leadsAdminsCouncilCount"
    )
  leadsStream: [Stream!]! @relationship(type: "LEADS", direction: OUT)
  leadsStreamCount: Int
    @cypher(
      statement: """
      MATCH (this)-[:LEADS]->(stream:Stream)
      RETURN COUNT(DISTINCT stream) AS leadsStreamCount
      """
      columnName: "leadsStreamCount"
    )
  isAdminForStreamCount: Int
    @cypher(
      statement: """
      MATCH (this)-[:IS_ADMIN_FOR]->(stream:Stream)
      RETURN COUNT(DISTINCT stream)   AS isAdminForStreamCount
      """
      columnName: "isAdminForStreamCount"
    )
  leadsCampus: [Campus!]! @relationship(type: "LEADS", direction: OUT)
  isAdminForCampusCount: Int
    @cypher(
      statement: """
      MATCH (this)-[:IS_ADMIN_FOR]->(campus:Campus)
      RETURN COUNT(DISTINCT campus) AS isAdminForCampusCount
      """
      columnName: "isAdminForCampusCount"
    )
  leadsCampusCount: Int
    @cypher(
      statement: """
      MATCH (this)-[:LEADS]->(campus:Campus)
      RETURN COUNT(DISTINCT campus) AS leadsCampusCount
      """
      columnName: "leadsCampusCount"
    )
  leadsAdminsCampusCount: Int
    @cypher(
      statement: """
      MATCH (this)-[:LEADS|IS_ADMIN_FOR]->(campus:Campus)
      RETURN COUNT(DISTINCT campus) AS leadsAdminsCampusCount
      """
      columnName: "leadsAdminsCampusCount"
    )

  leadsOversight: [Oversight!]! @relationship(type: "LEADS", direction: OUT)
  isAdminForOversightCount: Int
    @cypher(
      statement: """
      MATCH (this)-[:IS_ADMIN_FOR]->(oversight:Oversight)
      RETURN COUNT(DISTINCT oversight) AS isAdminForOversightCount
      """
      columnName: "isAdminForOversightCount"
    )
  leadsOversightCount: Int!
    @cypher(
      statement: """
      MATCH (this)-[:LEADS]->(oversight:Oversight)
      RETURN COUNT(DISTINCT oversight) AS leadsOversightCount
      """
      columnName: "leadsOversightCount"
    )
  leadsAdminsOversight: Int!
    @cypher(
      statement: """
      MATCH (this)-[:LEADS|IS_ADMIN_FOR]->(oversight:Oversight)
      RETURN COUNT(DISTINCT oversight) AS leadsAdminsOversight
      """
      columnName: "leadsAdminsOversight"
    )
  leadsDenomination: [Denomination!]!
    @relationship(type: "LEADS", direction: OUT)
  isAdminForDenominationCount: Int!
    @cypher(
      statement: """
      MATCH (this)-[:IS_ADMIN_FOR]->(denomination:Denomination)
      RETURN COUNT(DISTINCT denomination) AS isAdminForDenominationCount
      """
      columnName: "isAdminForDenominationCount"
    )
  leadsDenominationCount: Int!
    @cypher(
      statement: """
      MATCH (this)-[:LEADS]->(denomination:Denomination)
      RETURN COUNT(DISTINCT denomination) AS leadsDenominationCount
      """
      columnName: "leadsDenominationCount"
    )
  leadsAdminsDenominationCount: Int!
    @cypher(
      statement: """
      MATCH (this)-[:LEADS|IS_ADMIN_FOR]->(denomination:Denomination)
      RETURN COUNT(DISTINCT denomination) AS leadsAdminsDenominationCount
      """
      columnName: "leadsAdminsDenominationCount"
    )

  isAdminForDenomination: [Denomination!]!
    @relationship(type: "IS_ADMIN_FOR", direction: OUT)
  isAdminForOversight: [Oversight!]!
    @relationship(type: "IS_ADMIN_FOR", direction: OUT)
  isAdminForCampus: [Campus!]!
    @relationship(type: "IS_ADMIN_FOR", direction: OUT)
  isAdminForStream: [Stream!]!
    @relationship(type: "IS_ADMIN_FOR", direction: OUT)
  isAdminForCouncil: [Council!]!
    @relationship(type: "IS_ADMIN_FOR", direction: OUT)
  isAdminForGovernorship: [Governorship!]!
    @relationship(type: "IS_ADMIN_FOR", direction: OUT)

  #OTHER WORKS
  was_treasurer_for: [ServiceRecord!]!
    @relationship(type: "WAS_TREASURER_FOR", direction: OUT)
}

# Display-only summary of a Bacenta, returned by `Member.bacentaSummary`.
# Declared WITHOUT `@node` so `@neo4j/graphql` v7 treats this as a plain
# RPC response shape and does NOT auto-generate CRUD queries/mutations
# against a Neo4j `BacentaSummary` label. Carries id + name only — the
# full Bacenta node remains gated by the spine read-filter on Bacenta.
type BacentaSummary {
  id: String
  name: String
}

type Gender @node{
  gender: String
}

type MaritalStatus @node{
  status: String
}

type Occupation @node{
  occupation: String
}

type Title @node{
  name: String! #Pastor, Reverend, Apostle, Bishop (Mother)
}

type HasTitle @relationshipProperties {
  date: Date
}

interface TimeGraphNode {
  date: Date
}

type TimeGraph implements TimeGraphNode @node{
  id: ID
    @cypher(
      statement: """
      MATCH (this)
      RETURN toString(this.date) AS date
      """
      columnName: "date"
    )
  date: Date
  swell: Boolean
    @cypher(
      statement: """
      MATCH (this)
      UNWIND labels(this) AS swellStatus
      WITH swellStatus WHERE swellStatus ='SwellDate'
      RETURN true AS swell
      """
      columnName: "swell"
    )
  memberDob: Member @relationship(type: "WAS_BORN_ON", direction: IN)
  # titleAppointmentDate: Member @relationship(type: "APPOINTED_ON", direction: IN)
  leaderHistoryStartDate: Member
    @relationship(type: "LEADER_STARTED_ON", direction: OUT)
  leaderHistoryEndDate: TimeGraph
    @relationship(type: "LEADER_ENDED_ON", direction: OUT)
  historyDate: Member @relationship(type: "RECORDED_ON", direction: OUT)
  serviceDate: [ServiceRecord!]!
    @relationship(type: "SERVICE_HELD_ON", direction: IN)
  bussingDate: [BussingRecord!]! @relationship(type: "BUSSED_ON", direction: IN)
}

type HistoryLog @node{
  id: ID! @id
  timeStamp: DateTime
  historyRecord: String #leader was transferred to
  createdAt: TimeGraph @relationship(type: "RECORDED_ON", direction: OUT)
  loggedBy: Member @relationship(type: "LOGGED_BY", direction: OUT)
  leaders: [Member!]! @relationship(type: "HAS_HISTORY", direction: IN)
  bacenta: [Bacenta!]! @relationship(type: "HAS_HISTORY", direction: IN)
  governorship: [Governorship!]!
    @relationship(type: "HAS_HISTORY", direction: IN)
}

##Church Types##
interface Church {
  id: ID
  name: String!
  leader: Member @declareRelationship
  members(
    limit: Int! = 1000
    offset: Int! = 0
    search: String
    genders: [String!]
    maritalStatuses: [String!]
    leaderTitles: [String!]
    basontas: [String!]
    leaderRanks: [String!]
  ): [Member!]!
  memberSearch(key: String!, limit: Int!): [Member!]!
  memberCount: Int!
  pastorCount: Int
  history(limit: Int! = 3, offset: Int! = 0): [HistoryLog!]!
  historyCount: Int!

  serviceLogs: [ServiceLog!]! @declareRelationship
  services(limit: Int!, skip: Int): [ServiceRecord!]!
}

type Denomination implements Church @node
  # @churchScoped(level: Denomination)
{
  id: ID! @id
  name: String!
  leader: Member @relationship(type: "LEADS", direction: IN)
  oversights: [Oversight!]! @relationship(type: "HAS", direction: OUT)
  campuses: [Campus!]!
    @cypher(
      statement: "MATCH (this)-[:HAS*2]->(campus:Campus) RETURN campus AS campuses"
      columnName: "campuses"
    )
  streams: [Stream!]!
    @cypher(
      statement: "MATCH (this)-[:HAS*3]->(stream:Stream) RETURN stream AS streams"
      columnName: "streams"
    )
  councils: [Council!]!
    @cypher(
      statement: "MATCH (this)-[:HAS*4]->(councils:Council) RETURN councils"
      columnName: "councils"
    )
  governorships: [Governorship!]!
    @cypher(
      statement: "MATCH (this)-[:HAS*5]->(governorships:Governorship) RETURN governorships"
      columnName: "governorships"
    )
  bacentas: [Bacenta!]!
    @cypher(
      statement: "MATCH (this)-[:HAS*6]->(bacentas:Bacenta) RETURN bacentas"
      columnName: "bacentas"
    )
  members(
    limit: Int! = 1000
    offset: Int! = 0
    search: String
    genders: [String!]
    maritalStatuses: [String!]
    leaderTitles: [String!]
    basontas: [String!]
    leaderRanks: [String!]
  ): [Member!]!
    @cypher(
      statement: """
      WITH this, $jwt AS jwt
      WHERE ANY(role IN jwt.roles WHERE role IN ['leaderDenomination', 'adminDenomination'])
      MATCH (this)-[:HAS*6]->(:Bacenta)<-[:BELONGS_TO]-(members:Active:Member)
      WHERE
        ($search IS NULL OR
         toLower(coalesce(members.firstName, '') + ' ' + coalesce(members.lastName, '')) CONTAINS toLower($search) OR
         (size($search) >= 4 AND coalesce(members.phoneNumber, '') CONTAINS $search))
        AND ($genders IS NULL OR EXISTS { MATCH (members)-[:HAS_GENDER]->(g:Gender) WHERE g.gender IN $genders })
        AND ($maritalStatuses IS NULL OR EXISTS { MATCH (members)-[:HAS_MARITAL_STATUS]->(ms:MaritalStatus) WHERE ms.status IN $maritalStatuses })
        AND ($leaderTitles IS NULL OR EXISTS { MATCH (members)-[:HAS_TITLE]->(t:Title) WHERE t.name IN $leaderTitles })
        AND ($basontas IS NULL OR EXISTS { MATCH (members)-[:BELONGS_TO]->(bs:Basonta) WHERE bs.name IN $basontas })
        AND ($leaderRanks IS NULL OR (
          ('Bacenta Leader' IN $leaderRanks AND EXISTS { MATCH (members)-[:LEADS]->(:Bacenta) }) OR
          ('CO' IN $leaderRanks AND EXISTS { MATCH (members)-[:LEADS]->(:Governorship) }) OR
          ('Admin' IN $leaderRanks AND (EXISTS { MATCH (members)-[:IS_ADMIN_FOR]->(:Council) } OR EXISTS { MATCH (members)-[:IS_ADMIN_FOR]->(:Governorship) }))
        ))
      RETURN DISTINCT members AS members
      ORDER BY toLower(members.firstName), toLower(members.lastName)
      SKIP $offset LIMIT $limit
      """
      columnName: "members"
    )

  memberCount: Int!
    @cypher(
      statement: """
      RETURN CASE
        WHEN ANY(role IN $jwt.roles WHERE role IN ['leaderDenomination', 'adminDenomination'])
        THEN COUNT { (this)-[:HAS*6]->(:Bacenta)<-[:BELONGS_TO]-(:Active:Member) }
        ELSE 0
      END AS memberCount
      """
      columnName: "memberCount"
    )
  pastorCount: Int
    @cypher(
      statement: """
      RETURN CASE
        WHEN ANY(role IN $jwt.roles WHERE role IN ['leaderDenomination', 'adminDenomination'])
        THEN COUNT {
          MATCH (this)-[:HAS*6]->(:Bacenta)<-[:BELONGS_TO]-(pastors:Active:Member)-[:HAS_TITLE]->(:Title)
          RETURN DISTINCT pastors
        }
        ELSE 0
      END AS pastorCount
      """
      columnName: "pastorCount"
    )
  campusCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS*2]->(campus:Campus) RETURN COUNT(campus) AS campusCount"
      columnName: "campusCount"
    )
  streamCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS*3]->(stream:Stream) RETURN COUNT(stream) AS streamCount"
      columnName: "streamCount"
    )
  councilCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS*4]->(council:Council) RETURN COUNT(council) AS councilCount"
      columnName: "councilCount"
    )
  governorshipCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS*5]->(governorship:Governorship) RETURN COUNT(governorship) AS governorshipCount"
      columnName: "governorshipCount"
    )
  bacentaCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS*6]->(bacentas:Bacenta) RETURN COUNT(DISTINCT bacentas) AS bacentaCount"
      columnName: "bacentaCount"
    )
  activeBacentaCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS*6]->(bacentas:Active:Bacenta) RETURN COUNT(DISTINCT bacentas) AS activeBacentaCount"
      columnName: "activeBacentaCount"
    )
  vacationBacentaCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS*6]-(bacentas:Vacation:Bacenta) RETURN COUNT(DISTINCT bacentas) AS vacationBacentaCount"
      columnName: "vacationBacentaCount"
    )
  activeBacentaICCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS*6]->(bacentas:Active:Bacenta:Red) RETURN COUNT(DISTINCT bacentas) AS activeBacentaICCount"
      columnName: "activeBacentaICCount"
    )
  vacationBacentaICCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS*6]-(bacentas:Vacation:Bacenta:Red) RETURN COUNT(DISTINCT bacentas) AS vacationBacentaICCount"
      columnName: "vacationBacentaICCount"
    )
  activeGraduatedBacentaCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS*6]->(bacentas:Active:Bacenta:Green) RETURN COUNT(DISTINCT bacentas) AS activeGraduatedBacentaCount"
      columnName: "activeGraduatedBacentaCount"
    )
  vacationGraduatedBacentaCount: Int
    @cypher(
      statement: "MATCH (this)-[:HAS*6]-(bacentas:Vacation:Bacenta:Green) RETURN COUNT(DISTINCT bacentas) AS vacationGraduatedBacentaCount"
      columnName: "vacationGraduatedBacentaCount"
    )

  admin: Member @relationship(type: "IS_ADMIN_FOR", direction: IN)
  history(limit: Int! = 3, offset: Int! = 0): [HistoryLog!]!
    @cypher(
      statement: "MATCH (this)-[:HAS_HISTORY|OLD_HISTORY]->(log:HistoryLog) RETURN DISTINCT log AS history ORDER BY log.timeStamp DESC, log.id SKIP $offset LIMIT $limit"
      columnName: "history"
    )
  historyCount: Int!
    @cypher(
      statement: "MATCH (this)-[:HAS_HISTORY|OLD_HISTORY]->(log:HistoryLog) RETURN count(DISTINCT log) AS total"
      columnName: "total"
    )
  serviceLogs: [ServiceLog!]! @relationship(type: "HAS_HISTORY", direction: OUT)
  services(limit: Int!, skip: Int = 0): [ServiceRecord!]!
    @cypher(
      statement: """
      MATCH (this)-[:HAS_HISTORY]->(:ServiceLog)-[:HAS_SERVICE]->(records:ServiceRecord)-[:SERVICE_HELD_ON]->(date:TimeGraph)
      WITH DISTINCT records, date
      RETURN records AS services ORDER BY date.date DESC SKIP $skip LIMIT $limit
      """
      columnName: "services"
    )
}

type Oversight implements Church @node
  # @churchScoped(level: Oversight)
{
  id: ID @id
  name: String!
  noIncomeTracking: Boolean
  leader: Member @relationship(type: "LEADS", direction: IN)
  denomination: Denomination @relationship(type: "HAS", direction: IN)
  campuses: [Campus!]! @relationship(type: "HAS", direction: OUT)
  streams: [Stream!]!
    @cypher(
      statement: "MATCH (this)-[:HAS*2]->(stream:Stream) RETURN stream AS streams"
      columnName: "streams"
    )
  councils: [Council!]!
    @cypher(
      statement: "MATCH (this)-[:HAS*3]->(councils:Council) RETURN councils"
      columnName: "councils"
    )
  governorships: [Governorship!]!
    @cypher(
      statement: "MATCH (this)-[:HAS*4]->(governorships:Governorship) RETURN governorships"
      columnName: "governorships"
    )
  bacentas: [Bacenta!]!
    @cypher(
      statement: "MATCH (this)-[:HAS*5]->(bacentas:Bacenta) RETURN bacentas"
      columnName: "bacentas"
    )
  members(
    limit: Int! = 1000
    offset: Int! = 0
    search: String
    genders: [String!]
    maritalStatuses: [String!]
    leaderTitles: [String!]
    basontas: [String!]
    leaderRanks: [String!]
  ): [Member!]!
    @cypher(
      statement: """
      WITH this, $jwt AS jwt
      WHERE ANY(role IN jwt.roles WHERE role IN ['leaderDenomination', 'leaderOversight', 'adminDenomination', 'adminOversight'])
      MATCH (this)-[:HAS*5]->(:Bacenta)<-[:BELONGS_TO]-(members:Active:Member)
      WHERE
        ($search IS NULL OR
