      columnName: "total"
    )
}

extend type Mutation {
  # SYN-96 — lifted to imperative resolver (accountsMutations) so the
  # role gate, cross-campus scope check, and amount validation run
  # before any write. Roles preserved at adminCampus only.
  SetCouncilHRAmount(councilId: ID!, amount: Float!): Council!
  DepositIntoCouncilCurrentAccount(
    councilId: ID!
    weekdayBalanceDepositAmount: Float!
    clientTransactionId: ID!
  ): AccountTransaction!

  DepositIntoCouncilBussingSociety(
    councilId: ID!
    bussingSocietyBalance: Float!
    clientTransactionId: ID!
  ): AccountTransaction!

  ExpenseRequest(
    councilId: ID!
    expenseAmount: Float!
    expenseCategory: String!
    accountType: String!
    description: String!
    clientTransactionId: ID!
  ): AccountTransaction!

  ApproveExpense(transactionId: ID!, charge: Float!): AccountTransaction!

  # SYN-96 — lifted to imperative resolver. Adds the SYN-92 status
  # precondition so an already-approved transaction cannot be silently
  # re-flipped to 'declined'. Roles preserved at adminCampus +
  # leaderCampus.
  DeclineExpense(transactionId: ID!): AccountTransaction!
  UndoBussingTransaction(transactionId: ID!): Council!
  UndoWeekdayTransaction(transactionId: ID!): Council!

  DebitBussingSociety(
    councilId: ID!
    expenseAmount: Float!
    expenseCategory: String!
    clientTransactionId: ID!
  ): AccountTransaction!
}
