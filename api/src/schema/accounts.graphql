extend type Council {
  hrAmount: Float
  bussingAmount: Float
  weekdayBalance: Float!
  bussingSocietyBalance: Float
  transactions(limit: Int! = 1000, offset: Int! = 0): [AccountTransaction!]!
    @cypher(
      statement: """
      MATCH (this)-[:HAS_TRANSACTION]->(transaction:AccountTransaction)
      RETURN transaction ORDER BY transaction.lastModified DESC, transaction.id SKIP $offset LIMIT $limit
      """
      columnName: "transaction"
    )
  transactionCount: Int!
    @cypher(
      statement: """
      MATCH (this)-[:HAS_TRANSACTION]->(transaction:AccountTransaction)
      RETURN count(DISTINCT transaction) AS total
      """
      columnName: "total"
    )
}

extend type Mutation {
  SetCouncilHRAmount(councilId: ID!, amount: Float!): Council!
    @authentication(jwt: { roles: { includes: "adminCampus" } })
    @cypher(
      statement: """
      MATCH (council:Council {id: $councilId})
        SET council.hrAmount = $amount
      RETURN council
      """
      columnName: "council"
    )
  DepositIntoCouncilCurrentAccount(
    councilId: ID!
    weekdayBalanceDepositAmount: Float!
  ): AccountTransaction!

  DepositIntoCouncilBussingSociety(
    councilId: ID!
    bussingSocietyBalance: Float!
  ): AccountTransaction!

  ExpenseRequest(
    councilId: ID!
    expenseAmount: Float!
    expenseCategory: String!
    accountType: String!
    description: String!
  ): AccountTransaction!

  ApproveExpense(transactionId: ID!, charge: Float!): AccountTransaction!

  DeclineExpense(transactionId: ID!): AccountTransaction!
    @authentication(
      jwt: {
        OR: [
          { roles: { includes: "adminCampus" } }
          { roles: { includes: "leaderCampus" } }
        ]
      }
    )
    @cypher(
      statement: """
      MATCH (transaction:AccountTransaction {id: $transactionId})
        SET transaction.status = 'declined'

      RETURN transaction
      """
      columnName: "transaction"
    )
  UndoBussingTransaction(transactionId: ID!): Council!
  UndoWeekdayTransaction(transactionId: ID!): Council!

  DebitBussingSociety(
    councilId: ID!
    expenseAmount: Float!
    expenseCategory: String!
  ): AccountTransaction!
}
