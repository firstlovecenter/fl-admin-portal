  bussingAmount: Float!
    @cypher(
      statement: """
      MATCH (this)-[:HAS_TRANSACTION]->(t:AccountTransaction)
      WHERE t.category = 'Bussing' AND t.status = 'success'
      RETURN coalesce(SUM(-t.amount), 0) AS bussingAmount
      """
      columnName: "bussingAmount"
    )
  weekdayBalance: Float!
  bussingSocietyBalance: Float
  # SYN-105: $limit is server-clamped to <=200 inside the @cypher LIMIT
  # clause (CASE WHEN $limit > 200 THEN 200 ELSE $limit END). The default
  # 1000 is irrelevant — even an explicit `limit: 100000` returns at most
  # 200 rows. Sort uses the new RANGE INDEX on AccountTransaction(lastModified)
  # added by api/src/scripts/migrate-account-transaction-lastmodified-index.js.
  transactions(limit: Int! = 1000, offset: Int! = 0): [AccountTransaction!]!
    @cypher(
      statement: """
