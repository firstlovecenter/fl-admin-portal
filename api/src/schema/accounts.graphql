type AccountTransaction @node
  @mutation(operations: [])
  # @churchScopedVia(field: council, level: Council)
{
  id: ID!
  createdAt: DateTime!
  lastModified: DateTime!
  description: String!
  account: String!
  amount: Float!
  charge: Float
  category: String!
  status: String!

  momoNumber: String
  momoName: String
  invoiceUrl: String

  council: Council @relationship(type: "HAS_TRANSACTION", direction: IN)
  loggedBy: Member @relationship(type: "LOGGED_BY", direction: OUT)

  bussingSocietyBalance: Float!
  weekdayBalance: Float!
}

extend type Oversight {
  hrAmount: Float!
    @cypher(
      statement: """
      MATCH (this)-[:HAS*3]->(council:Council)
      RETURN SUM(council.hrAmount) AS hrAmount
      """
      columnName: "hrAmount"
    )
  bussingAmount: Float!
    @cypher(
      statement: """
      MATCH (this)-[:HAS*3]->(council:Council)
      RETURN SUM(council.bussingAmount) AS bussingAmount
      """
      columnName: "bussingAmount"
    )
  weekdayBalance: Float!
    @cypher(
      statement: """
      MATCH (this)-[:HAS*3]->(council:Council)
      RETURN SUM(council.weekdayBalance) AS weekdayBalance
      """
      columnName: "weekdayBalance"
    )
  bussingSocietyBalance: Float!
    @cypher(
      statement: """
      MATCH (this)-[:HAS*3]->(council:Council)
      RETURN SUM(council.bussingSocietyBalance) AS bussingSocietyBalance
      """
      columnName: "bussingSocietyBalance"
    )
}

extend type Campus {
  hrAmount: Float!
    @cypher(
      statement: """
      MATCH (this)-[:HAS*2]->(council:Council)
      RETURN SUM(council.hrAmount) AS hrAmount
      """
      columnName: "hrAmount"
    )
  bussingAmount: Float!
    @cypher(
      statement: """
      MATCH (this)-[:HAS*2]->(council:Council)
      RETURN SUM(council.bussingAmount) AS bussingAmount
      """
      columnName: "bussingAmount"
    )
  weekdayBalance: Float!
    @cypher(
      statement: """
      MATCH (this)-[:HAS*2]->(council:Council)
      RETURN SUM(council.weekdayBalance) AS weekdayBalance
      """
      columnName: "weekdayBalance"
    )
  bussingSocietyBalance: Float!
    @cypher(
      statement: """
      MATCH (this)-[:HAS*2]->(council:Council)
      RETURN SUM(council.bussingSocietyBalance) AS bussingSocietyBalance
      """
      columnName: "bussingSocietyBalance"
    )
  transactions(limit: Int! = 1000, offset: Int! = 0): [AccountTransaction!]!
    @cypher(
      statement: """
      MATCH (this)-[:HAS*2]->(council:Council)-[:HAS_TRANSACTION]->(transaction:AccountTransaction)
      RETURN transaction ORDER BY transaction.lastModified DESC, transaction.id SKIP $offset LIMIT $limit
      """
      columnName: "transaction"
    )
  transactionCount: Int!
    @cypher(
      statement: """
      MATCH (this)-[:HAS*2]->(council:Council)-[:HAS_TRANSACTION]->(transaction:AccountTransaction)
      RETURN count(DISTINCT transaction) AS total
      """
      columnName: "total"
    )
}

