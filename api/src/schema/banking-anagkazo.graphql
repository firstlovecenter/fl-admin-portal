extend type Stream {
  tellers: [Member!]! @relationship(type: "IS_TELLER_FOR", direction: IN)
}

extend type ServiceRecord {
  tellerConfirmationTime: DateTime
  bankingConfirmer: Member
    @relationship(type: "CONFIRMED_BANKING_FOR", direction: IN)
}

extend type Member {
  isTellerForStream: [Stream!]!
    @relationship(type: "IS_TELLER_FOR", direction: OUT)
}

extend type Mutation {
  MakeStreamTeller(streamId: ID!, tellerId: ID!): Member!
  RemoveStreamTeller(streamId: ID!, tellerId: ID!): Member!
  ConfirmBanking(governorshipId: ID!): Governorship!
}

extend type Stream {
  governorshipBankingDefaultersThisWeek: [Governorship!]!
    @cypher(
      statement: """
      MATCH (this)
      WITH date() as today, this
      WITH  today.weekDay as theDay, today, this
      WITH date(today) - duration({days: (theDay - 2)}) AS startDate, this
      WITH [day in range(0, 5) | startDate + duration({days: day})] AS dates, this

      MATCH (date:TimeGraph)
      USING INDEX date:TimeGraph(date)
      WHERE date.date IN dates
      MATCH (date)<-[:SERVICE_HELD_ON]-(record:ServiceRecord)

       WITH DISTINCT record, this
        WHERE record.noServiceReason IS NULL
          AND record.bankingSlip IS NULL
          AND (record.transactionStatus IS NULL OR record.transactionStatus <> 'success')
          AND record.tellerConfirmationTime IS NULL
       MATCH (record)<-[:HAS_SERVICE]-(:ServiceLog)<-[:HAS_HISTORY|HAS*1..2]-(governorships) WHERE governorships:Governorship OR governorships:ClosedGovernorship

       WITH DISTINCT governorships, this
       MATCH (governorships)<-[:HAS]-(:Council)<-[:HAS]-(this)

      RETURN DISTINCT governorships AS governorshipBankingDefaultersThisWeek
      """
      columnName: "governorshipBankingDefaultersThisWeek"
    )
  governorshipBankingDefaultersThisWeekCount: Int
    @cypher(
      statement: """
      MATCH (this)
      WITH date() as today, this
      WITH  today.weekDay as theDay, today, this
      WITH date(today) - duration({days: (theDay - 2)}) AS startDate, this
      WITH [day in range(0, 5) | startDate + duration({days: day})] AS dates, this

      MATCH (date:TimeGraph)
      USING INDEX date:TimeGraph(date)
      WHERE date.date IN dates
      MATCH (date)<-[:SERVICE_HELD_ON]-(record:ServiceRecord)

       WITH DISTINCT record, this
        WHERE record.noServiceReason IS NULL
          AND record.bankingSlip IS NULL
          AND (record.transactionStatus IS NULL OR record.transactionStatus <> 'success')
          AND record.tellerConfirmationTime IS NULL
       MATCH (record)<-[:HAS_SERVICE]-(:ServiceLog)<-[:HAS_HISTORY|HAS*1..2]-(governorships) WHERE governorships:Governorship OR governorships:ClosedGovernorship

       WITH DISTINCT governorships, this
       MATCH (governorships)<-[:HAS]-(:Council)<-[:HAS]-(this)

      RETURN COUNT(DISTINCT governorships) AS governorshipBankingDefaultersThisWeekCount
      """
      columnName: "governorshipBankingDefaultersThisWeekCount"
    )
}

extend type AggregateServiceRecord {
  foreignCurrency: [String!]
}

extend type Governorship {
  aggregateServiceRecordForWeek(week: Int!): AggregateServiceRecord!
    @cypher(
      statement: """
      WITH this, date() AS today
      WITH this, [day IN range(0, 5) | date(today) - duration({days: (today.weekDay - 2)}) + duration({days: day})] AS dates

      MATCH (dateNode:TimeGraph)
      USING INDEX dateNode:TimeGraph(date)
      WHERE dateNode.date IN dates
      OPTIONAL MATCH (dateNode)<-[:SERVICE_HELD_ON]-(record:ServiceRecord)<-[:HAS_SERVICE]-(:ServiceLog)<-[:CURRENT_HISTORY]-(this)
      WHERE record.noServiceReason IS NULL
        AND record.bankingSlip IS NULL
        AND (record.transactionStatus IS NULL OR record.transactionStatus <> 'success')
        AND record.tellerConfirmationTime IS NULL
      WITH this, dates, collect(DISTINCT record) AS ownRecords

      MATCH (dateNode2:TimeGraph)
      USING INDEX dateNode2:TimeGraph(date)
      WHERE dateNode2.date IN dates
      OPTIONAL MATCH (dateNode2)<-[:SERVICE_HELD_ON]-(record2:ServiceRecord)<-[:HAS_SERVICE]-(:ServiceLog)<-[:CURRENT_HISTORY]-(:Bacenta)<-[:HAS]-(this)
      WHERE record2.noServiceReason IS NULL
        AND record2.bankingSlip IS NULL
        AND (record2.transactionStatus IS NULL OR record2.transactionStatus <> 'success')
        AND record2.tellerConfirmationTime IS NULL
      WITH this, ownRecords + collect(DISTINCT record2) AS allRecords

      WITH this,
      [r IN allRecords WHERE r.foreignCurrency IS NOT NULL | r.foreignCurrency] AS list,
      round(coalesce(reduce(s = 0.0, r IN allRecords | s + coalesce(r.income, r.cash, 0)), 0), 2) AS income,
      toInteger(coalesce(reduce(s = 0, r IN allRecords | s + coalesce(r.attendance, 0)), 0)) AS attendance

      OPTIONAL MATCH (this)-[:HAS_HISTORY]->(:ServiceLog)-[:HAS_SERVICE_AGGREGATE]->(agg:AggregateServiceRecord)
      WHERE agg.week = $week AND agg.year = date().year

      WITH this, list, income, attendance, agg ORDER BY coalesce(agg.recomputedAt, datetime({epochSeconds: 0})) DESC
      WITH this, list, income, attendance, head(collect(agg)) AS agg

      RETURN {
        id: coalesce(agg.id, this.id + '-' + toString($week) + '-' + toString(date().year)),
        attendance: attendance,
        income: income,
        week: $week,
        year: date().year,
        foreignCurrency: list
      } AS aggregateServiceRecordForWeek
      """
      columnName: "aggregateServiceRecordForWeek"
    )
  banked: Boolean!
    @cypher(
      statement: """
      MATCH (this)
      WITH date() as today, this
      WITH  today.weekDay as theDay, today, this
      WITH date(today) - duration({days: (theDay - 2)}) AS startDate, this
      WITH [day in range(0, 5) | startDate + duration({days: day})] AS dates, this

      MATCH (date:TimeGraph)
      USING INDEX date:TimeGraph(date)
      WHERE date.date IN dates
      MATCH (date)<-[:SERVICE_HELD_ON]-(record:ServiceRecord)

      WITH DISTINCT record, this
        WHERE record.noServiceReason IS NULL
          AND record.bankingSlip IS NULL
          AND (record.transactionStatus IS NULL OR record.transactionStatus <> 'success')
          AND record.tellerConfirmationTime IS NULL
      MATCH (record)<-[:HAS_SERVICE]-(:ServiceLog)<-[:HAS_HISTORY]-(bacentas) WHERE bacentas:Bacenta OR bacentas:ClosedBacenta

      WITH DISTINCT bacentas, this
      MATCH (bacentas)<-[:HAS]-(this)

      WITH COUNT(DISTINCT bacentas) as bankingDefaulters
      RETURN
      CASE bankingDefaulters
      WHEN 0 THEN true
      ELSE false
      END AS banked
      """
      columnName: "banked"
    )

  bankedBy: Member
    @cypher(
      statement: """
      MATCH (this)
      WITH date() as today, this
      WITH  today.weekDay as theDay, today, this
      WITH date(today) - duration({days: (theDay - 2)}) AS startDate, this
      WITH [day in range(0, 5) | startDate + duration({days: day})] AS dates, this

      MATCH (date:TimeGraph)
      USING INDEX date:TimeGraph(date)
      WHERE date.date IN dates
      MATCH (date)<-[:SERVICE_HELD_ON]-(record:ServiceRecord)

       WITH DISTINCT record, this
        WHERE record.noServiceReason IS NULL
        AND (record.bankingSlip IS NOT NULL OR record.transactionStatus ='success' OR record.tellerConfirmationTime IS NOT NULL)
       MATCH (record)<-[:HAS_SERVICE]-(:ServiceLog)<-[:HAS_HISTORY]-(bacentas) WHERE bacentas:Bacenta OR bacentas:ClosedBacenta


      WITH DISTINCT  this, record
      MATCH (teller:Member)-[:CONFIRMED_BANKING_FOR]->(record:ServiceRecord)<-[:HAS_SERVICE]-(:ServiceLog)<-[:HAS_HISTORY]-(bacentas)<-[:HAS]-(this)


      RETURN DISTINCT teller AS bankedBy
      """
      columnName: "bankedBy"
    )
}
